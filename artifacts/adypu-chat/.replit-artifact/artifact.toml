kind = "web"
previewPath = "/"
title = "ADYPU Chat"
version = "1.0.0"
id = "artifacts/adypu-chat"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21740

[services.development]
run = "pnpm --filter @workspace/adypu-chat run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/adypu-chat", "run", "build" ]
publicDir = "artifacts/adypu-chat/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21740"
BASE_PATH = "/"
